name: autostream-control-panel CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  go:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.mod
      - run: go test ./...
      - name: Test backup script with root-owned Linux fixtures
        run: |
          docker run --rm \
            --user 0:0 \
            --network none \
            --cap-drop ALL \
            --security-opt no-new-privileges \
            --pids-limit 128 \
            --memory 256m \
            --cpus 1 \
            --mount "type=bind,source=${GITHUB_WORKSPACE},target=/workspace,readonly" \
            ubuntu@sha256:4fbb8e6a8395de5a7550b33509421a2bafbc0aab6c06ba2cef9ebffbc7092d90 \
            /bin/bash /workspace/internal/security/testdata/run-backup-script-root-smoke.sh \
              /workspace/release/autostream-backup-control-panel.example \
              /var/backups/autostream/control-panel \
              autostream_control_panel \
              autostream-kometubu_panel
      - run: go build ./...

  web:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run build

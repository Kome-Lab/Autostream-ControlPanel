name: Host Release

on:
  push:
    tags:
      - "v[0-9]*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example v1.2.3"
        required: true
        type: string
      push_release:
        description: "Attach artifacts to a GitHub Release"
        required: true
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  release-host:
    name: Build Linux host artifacts
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.meta.outputs.version }}
      push_release: ${{ steps.meta.outputs.push_release }}
    env:
      SERVICE_NAME: control-panel
      ARTIFACT_PREFIX: autostream-control-panel
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16
        with:
          go-version-file: go.mod
          cache-dependency-path: go.mod

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME}"
            push_release="true"
          else
            version="${{ inputs.version }}"
            push_release="${{ inputs.push_release }}"
          fi
          if [[ "${version}" =~ ^v\. ]]; then
            echo "Version must look like v1.2.3, not ${version}. Remove the dot after v." >&2
            exit 1
          fi
          if [[ ! "${version}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Version must look like v1.2.3; got ${version}" >&2
            exit 1
          fi
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "push_release=${push_release}" >> "${GITHUB_OUTPUT}"

      - name: Test
        run: go test ./...

      - name: Build web assets
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Package linux artifacts
        shell: bash
        run: |
          set -euo pipefail
          version="${{ steps.meta.outputs.version }}"
          rm -rf staging artifacts
          mkdir -p staging artifacts
          for arch in amd64 arm64; do
            artifact="${ARTIFACT_PREFIX}_${version}_linux_${arch}"
            root="staging/${artifact}"
            mkdir -p "${root}/bin" "${root}/systemd" "${root}/share/autostream-control-panel"
            GOOS=linux GOARCH="${arch}" CGO_ENABLED=0 go build -trimpath -ldflags="-s -w" -o "${root}/bin/${SERVICE_NAME}" ./cmd/control-panel
            cp .env.example "${root}/.env.example"
            cp systemd/*.service.example "${root}/systemd/"
            test -d web/out
            cp -R web/out/. "${root}/share/autostream-control-panel/"
            cp release/README.install.md "${root}/README.install.md"
            (cd "${root}" && find . -type f -print0 | sort -z | xargs -0 sha256sum > checksums.txt)
            tar -C staging -czf "artifacts/${artifact}.tar.gz" "${artifact}"
            sha256sum "artifacts/${artifact}.tar.gz" > "artifacts/${artifact}.tar.gz.sha256"
          done

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: host-release-dry-run
          path: artifacts/*

  publish-release:
    name: Publish GitHub Release
    needs: release-host
    if: needs.release-host.outputs.push_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131
        with:
          name: host-release-dry-run
          path: artifacts

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b
        with:
          tag_name: ${{ needs.release-host.outputs.version }}
          files: artifacts/*



services:
  control-panel:
    environment:
      AUTOSTREAM_BIND_ADDR: 0.0.0.0:8080
      AUTOSTREAM_PUBLIC_URL: http://localhost:8080
      AUTOSTREAM_DATA_DIR: /var/lib/autostream/control-panel
      AUTOSTREAM_TRUSTED_PROXIES: 127.0.0.1
      AUTOSTREAM_SESSION_SECRET: dev-only-session-secret-change-me-change-me-change-me-123456
      AUTOSTREAM_SECRET_ENCRYPTION_KEY: dev-only-local-secret-encryption-key
      AUTOSTREAM_SETUP_TOKEN: dev-only-control-panel-setup-token
      DATABASE_URL: mysql://autostream:example_password_change_me@tcp(mariadb:3306)/autostream_control_panel?parseTime=true
      OBSERVABILITY_URL: http://host.docker.internal:8082
      OBSERVABILITY_TOKEN: dev-only-observability-admin-token
      SERVICE_CALL_TOKEN: dev-only-control-to-service-token
      AUTOSTREAM_STREAM_INGEST_SIGNING_KEY: dev-only-stream-ingest-signing-key-change-me
      AUTOSTREAM_STREAM_INGEST_TOKEN_TTL_MIN: 720
      AUTOSTREAM_SERVICE_ALLOWED_HOSTS: host.docker.internal
      TZ: Asia/Tokyo
